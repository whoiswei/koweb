{% load static %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實境解謎裝置</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="navbar">
        <a href="{% url 'home' %}" style="color:var(--neon-yellow); text-decoration:none;">
            <h2>實境解謎裝置 IoT Escape</h2>
        </a>
        <div>
            {% if user.is_authenticated %}
                <span style="margin-right: 15px; color: var(--neon-pink);">Welcome, {{ user.username }}</span>
                <a href="{% url 'dashboard' %}" class="pixel-btn">Dashboard</a>
                <a href="{% url 'logout' %}" class="pixel-btn pink">登出</a>
            {% else %}
                <a href="{% url 'home' %}" class="pixel-btn">登入 / 註冊</a>
            {% endif %}
        </div>
    </div>
    
    <div class="heart-container">
        <div class="pixel-heart blue"></div>
        <div class="pixel-heart pink"></div>
        <div class="pixel-heart yellow"></div>
        <div style="font-size: 20px; line-height: 40px; margin: 0 20px; letter-spacing: 4px; color: var(--primary-blue);">...</div>
        <div class="pixel-heart blue"></div>
        <div class="pixel-heart pink"></div>
        <div class="pixel-heart yellow"></div>
    </div>

    <div class="container">
        {% block content %}
        {% endblock content %}
    </div>
</body>
</html>
