<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows XP - 物聯網個人專題</title>
  <!-- XP.css 樣式表 -->
  <link rel="stylesheet" href="https://unpkg.com/xp.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* 全域設定與桌布 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Tahoma, 'Segoe UI', Geneva, Verdana, sans-serif;
      /* 經典 Bliss 桌布：改用 XP.css 官方 GitHub 穩定的圖片網址 */
      background: url('https://raw.githubusercontent.com/botoxparty/XP.css/main/docs/assets/bliss.jpg') no-repeat center center fixed;
      background-size: cover;
      user-select: none;
    }

    /* 桌面圖示網格 */
    .desktop {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% - 30px);
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-content: flex-start;
      padding: 10px;
      gap: 15px;
    }

    .desktop-icon {
      width: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      text-align: center;
    }

    .desktop-icon img {
      width: 32px;
      height: 32px;
      margin-bottom: 4px;
      filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.5));
    }

    .desktop-icon span {
      color: white;
      font-size: 11px;
      text-shadow: 1px 1px 2px black;
      padding: 2px 4px;
      border: 1px dotted transparent;
    }

    .desktop-icon:hover span {
      background-color: rgba(255, 255, 255, 0.2);
    }
    .desktop-icon.selected span {
      background-color: #0b61ff;
      border: 1px dotted #ffffff;
      text-shadow: none;
    }

    /* 視窗樣式 */
    .window {
      position: absolute;
      display: none;
      min-width: 300px;
      min-height: 150px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
      /* 讓視窗可以從右下角拖拉改變大小 */
      resize: both;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .title-bar {
      cursor: grab;
      flex-shrink: 0;
    }
    .title-bar:active {
      cursor: grabbing;
    }
    
    .window-body {
      flex-grow: 1;
      overflow: auto; /* 內容過多時捲動 */
      margin: 0;
      padding: 10px;
    }

    /* 工作列 */
    .taskbar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30px;
      background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #245edb 92%, #333 100%);
      display: flex;
      align-items: center;
      z-index: 10000;
      border-top: 1px solid #0055eb;
    }

    .start-button {
      background: linear-gradient(to bottom, #3f8cf3 0%, #245edb 100%);
      border: none;
      border-radius: 0 10px 10px 0;
      color: white;
      font-weight: bold;
      font-style: italic;
      font-size: 14px;
      height: 30px;
      padding: 0 20px 0 15px;
      display: flex;
      align-items: center;
      cursor: pointer;
      box-shadow: 2px 2px 3px rgba(0,0,0,0.5);
    }

    .start-button:hover, .start-button.active {
      background: linear-gradient(to bottom, #1c4a9e 0%, #245edb 100%);
      box-shadow: inset 2px 2px 3px rgba(0,0,0,0.5);
    }

    .start-button img {
      width: 16px;
      height: 16px;
      margin-right: 5px;
    }

    .task-area {
      display: flex;
      flex-grow: 1;
      padding: 0 5px;
      gap: 3px;
    }

    .task-item {
      background: #3f8cf3;
      border: 1px solid #1a3b86;
      border-radius: 3px;
      color: white;
      padding: 2px 10px;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      min-width: 100px;
      max-width: 150px;
      height: 22px;
      box-shadow: inset 1px 1px 0 rgba(255,255,255,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-item img {
      width: 14px;
      height: 14px;
      margin-right: 5px;
    }

    .task-item:hover {
      background: #5a9df6;
    }

    .task-item.active {
      background: #1c4a9e;
      box-shadow: inset 2px 2px 3px rgba(0,0,0,0.5);
    }

    .tray {
      background: linear-gradient(to bottom, #0cb0ed 0%, #088ee3 100%);
      height: 100%;
      padding: 0 10px;
      display: flex;
      align-items: center;
      color: white;
      font-size: 11px;
      border-left: 1px solid #1042af;
      box-shadow: inset 1px 0 0 rgba(255,255,255,0.4);
    }

    /* 開始選單 (預設隱藏) */
    .start-menu {
      position: absolute;
      bottom: 30px;
      left: 0;
      width: 380px;
      height: 480px;
      background: white;
      border: 1px solid #0055eb;
      border-radius: 5px 5px 0 0;
      display: none;
      z-index: 10001;
      box-shadow: 2px -2px 5px rgba(0,0,0,0.5);
      flex-direction: column;
    }
    
    .start-menu-header {
      background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 100%);
      height: 60px;
      border-radius: 5px 5px 0 0;
      display: flex;
      align-items: center;
      padding: 0 10px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-bottom: 2px solid #ef8218;
    }
    .start-menu-header img {
      width: 42px;
      height: 42px;
      border: 2px solid white;
      border-radius: 5px;
      margin-right: 10px;
    }
    
    .start-menu-body {
      display: flex;
      flex-grow: 1;
      background: white;
    }
    .start-menu-left {
      flex: 1;
      padding: 5px;
    }
    .start-menu-right {
      width: 150px;
      background: #d3e5fa;
      border-left: 1px solid #95bcee;
      padding: 5px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      padding: 8px 5px;
      cursor: pointer;
      color: black;
      text-decoration: none;
    }
    .menu-item:hover {
      background: #2f71cd;
      color: white;
    }
    .menu-item img {
      width: 24px;
      height: 24px;
      margin-right: 10px;
    }
    .start-menu-footer {
      background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 100%);
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 10px;
    }

    /* 軟體內容客製化樣式 */
    .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
    .data-box { background: white; border: 2px inset #dfdfdf; padding: 10px; }
    .data-value { font-size: 2em; font-weight: bold; color: #000080; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #999; padding: 5px; text-align: left; font-size: 12px; }
    th { background: #ece9d8; }
  </style>
</head>
<body>

  <!-- 桌面圖示區 -->
  <div class="desktop" id="desktop">
    <div class="desktop-icon" ondblclick="openWindow('win-computer')">
      <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-5.png" alt="我的電腦">
      <span>我的電腦</span>
    </div>
    
    <div class="desktop-icon" ondblclick="openWindow('win-sensors')">
      <img src="https://win98icons.alexmeub.com/icons/png/hardware_camera-1.png" alt="即時感測">
      <span>即時感測</span>
    </div>

    <div class="desktop-icon" ondblclick="openWindow('win-chart')">
      <img src="https://win98icons.alexmeub.com/icons/png/chart1-1.png" alt="歷史圖表">
      <span>歷史圖表</span>
    </div>

    <div class="desktop-icon" ondblclick="openWindow('win-data')">
      <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" alt="原始資料">
      <span>原始資料</span>
    </div>
  </div>

  <!-- 開始選單 -->
  <div class="start-menu" id="start-menu">
    <div class="start-menu-header">
      <img src="https://win98icons.alexmeub.com/icons/png/user_world-0.png" alt="User">
      {{ name }}
    </div>
    <div class="start-menu-body">
      <div class="start-menu-left">
        <div class="menu-item" onclick="openWindow('win-computer'); toggleStartMenu();">
          <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-5.png"> 我的電腦
        </div>
        <div class="menu-item" onclick="openWindow('win-sensors'); toggleStartMenu();">
          <img src="https://win98icons.alexmeub.com/icons/png/hardware_camera-1.png"> 即時感測器監控
        </div>
        <div class="menu-item" onclick="openWindow('win-chart'); toggleStartMenu();">
          <img src="https://win98icons.alexmeub.com/icons/png/chart1-1.png"> 歷史數據圖表
        </div>
        <div class="menu-item" onclick="openWindow('win-data'); toggleStartMenu();">
          <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png"> 原始資料檢視
        </div>
      </div>
      <div class="start-menu-right">
        <div class="menu-item" onclick="window.location.reload();">
          <img src="https://win98icons.alexmeub.com/icons/png/update-0.png"> 重新整理頁面
        </div>
      </div>
    </div>
    <div class="start-menu-footer">
      <div class="menu-item" style="color:white; padding:0;" onclick="window.close();">
        <img src="https://win98icons.alexmeub.com/icons/png/shut_down_cool-0.png"> 關機
      </div>
    </div>
  </div>

  <!-- 視窗 1: 我的電腦 (個人資訊) -->
  <div class="window" id="win-computer" style="top: 50px; left: 100px; width: 350px; display: none;">
    <div class="title-bar">
      <div class="title-bar-text">
        <img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-5.png" style="width:12px; vertical-align:middle; margin-right:3px;"> 我的電腦
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize" onclick="toggleWindow('win-computer')"></button>
        <button aria-label="Maximize" onclick="maximizeWindow('win-computer')"></button>
        <button aria-label="Close" onclick="closeWindow('win-computer')"></button>
      </div>
    </div>
    <div class="window-body">
      <div style="display:flex; align-items:center; gap:15px; margin-bottom: 10px;">
        <img src="https://win98icons.alexmeub.com/icons/png/user_world-0.png" width="48">
        <div>
          <p style="margin:0 0 5px 0;"><strong>使用者資訊</strong></p>
          <p style="margin:0;">姓名：{{ name }}</p>
          <p style="margin:0;">學號：{{ student_id }}</p>
        </div>
      </div>
      <p>專案：物聯網個人專題網站</p>
      <a href="#" style="color: blue;">連線至組別總網站</a>
    </div>
  </div>

  <!-- 視窗 2: 即時感測器數據 -->
  <div class="window" id="win-sensors" style="top: 80px; left: 200px; width: 450px; display: none;">
    <div class="title-bar">
      <div class="title-bar-text">
        <img src="https://win98icons.alexmeub.com/icons/png/hardware_camera-1.png" style="width:12px; vertical-align:middle; margin-right:3px;"> 即時感測器監控
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize" onclick="toggleWindow('win-sensors')"></button>
        <button aria-label="Maximize" onclick="maximizeWindow('win-sensors')"></button>
        <button aria-label="Close" onclick="closeWindow('win-sensors')"></button>
      </div>
    </div>
    <div class="window-body">
      <div class="data-grid">
        <div class="data-box">
          <div>溫度</div>
          <div class="data-value" id="val-temperature">-- °C</div>
        </div>
        <div class="data-box">
          <div>濕度</div>
          <div class="data-value" id="val-humidity">-- %</div>
        </div>
        <div class="data-box">
          <div>光照度</div>
          <div class="data-value" id="val-light">-- lx</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 視窗 3: 歷史折線圖 -->
  <div class="window" id="win-chart" style="top: 110px; left: 300px; width: 500px; height: 350px; display: none;">
    <div class="title-bar">
      <div class="title-bar-text">
        <img src="https://win98icons.alexmeub.com/icons/png/chart1-1.png" style="width:12px; vertical-align:middle; margin-right:3px;"> 數據分析儀
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize" onclick="toggleWindow('win-chart')"></button>
        <button aria-label="Maximize" onclick="maximizeWindow('win-chart')"></button>
        <button aria-label="Close" onclick="closeWindow('win-chart')"></button>
      </div>
    </div>
    <div class="window-body" style="background: white;">
      <canvas id="sensorChart"></canvas>
    </div>
  </div>

  <!-- 視窗 4: 原始數據表格 -->
  <div class="window" id="win-data" style="top: 140px; left: 400px; width: 400px; height: 300px; display: none;">
    <div class="title-bar">
      <div class="title-bar-text">
        <img src="https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png" style="width:12px; vertical-align:middle; margin-right:3px;"> 資料庫檢視器
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize" onclick="toggleWindow('win-data')"></button>
        <button aria-label="Maximize" onclick="maximizeWindow('win-data')"></button>
        <button aria-label="Close" onclick="closeWindow('win-data')"></button>
      </div>
    </div>
    <div class="window-body">
      <table>
        <thead>
          <tr>
            <th>時間</th>
            <th>主題 (Topic)</th>
            <th>數值</th>
          </tr>
        </thead>
        <tbody id="history-table-body">
          <tr><td colspan="3" style="text-align: center;">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 底部工作列 -->
  <div class="taskbar">
    <button class="start-button" id="start-btn" onclick="toggleStartMenu(event)">
      <img src="https://win98icons.alexmeub.com/icons/png/windows-4.png" alt="Windows Logo"> 開始
    </button>
    <div class="task-area" id="task-area">
      <!-- 動態按鈕 -->
    </div>
    <div class="tray" id="clock">
      12:00 PM
    </div>
  </div>

  <script>
    // ======= 開始選單 ======= //
    function toggleStartMenu(e) {
      if(e) e.stopPropagation();
      const menu = document.getElementById('start-menu');
      const btn = document.getElementById('start-btn');
      if (menu.style.display === 'flex') {
        menu.style.display = 'none';
        btn.classList.remove('active');
      } else {
        menu.style.display = 'flex';
        btn.classList.add('active');
        bringToFront('start-menu', true); // 讓開始選單在最上層
      }
    }

    // 點擊桌面任何地方關閉開始選單
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('start-menu');
      const btn = document.getElementById('start-btn');
      if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.style.display = 'none';
        btn.classList.remove('active');
      }
    });

    // ======= 視窗管理系統 ======= //
    let zIndexCounter = 100;
    const windowTitles = {
      'win-computer': '我的電腦',
      'win-sensors': '即時感測器監控',
      'win-chart': '數據分析儀',
      'win-data': '資料庫檢視器'
    };
    const windowIcons = {
      'win-computer': 'https://win98icons.alexmeub.com/icons/png/computer_explorer-5.png',
      'win-sensors': 'https://win98icons.alexmeub.com/icons/png/hardware_camera-1.png',
      'win-chart': 'https://win98icons.alexmeub.com/icons/png/chart1-1.png',
      'win-data': 'https://win98icons.alexmeub.com/icons/png/directory_open_file_mydocs-4.png'
    };

    function bringToFront(winId, isMenu=false) {
      zIndexCounter++;
      document.getElementById(winId).style.zIndex = zIndexCounter;
      if(!isMenu) {
        document.querySelectorAll('.task-item').forEach(item => item.classList.remove('active'));
        const taskItem = document.getElementById('task-' + winId);
        if (taskItem) taskItem.classList.add('active');
      }
    }

    function openWindow(winId) {
      const win = document.getElementById(winId);
      if (win.style.display === 'none' || win.style.display === '') {
        win.style.display = 'flex'; // Use flex for window inner layout
        if (!document.getElementById('task-' + winId)) {
          const taskArea = document.getElementById('task-area');
          const btn = document.createElement('div');
          btn.className = 'task-item active';
          btn.id = 'task-' + winId;
          btn.innerHTML = `<img src="${windowIcons[winId]}"> ${windowTitles[winId]}`;
          btn.onclick = () => toggleWindow(winId);
          taskArea.appendChild(btn);
        }
      }
      bringToFront(winId);
    }

    function closeWindow(winId) {
      document.getElementById(winId).style.display = 'none';
      const taskBtn = document.getElementById('task-' + winId);
      if (taskBtn) taskBtn.remove();
    }

    function toggleWindow(winId) {
      const win = document.getElementById(winId);
      if (win.style.display === 'none') {
        win.style.display = 'flex';
        bringToFront(winId);
      } else {
        if (win.style.zIndex == zIndexCounter) {
          win.style.display = 'none';
          document.getElementById('task-' + winId).classList.remove('active');
        } else {
          bringToFront(winId);
        }
      }
    }

    // 放大/還原視窗
    function maximizeWindow(winId) {
      const win = document.getElementById(winId);
      if (!win.dataset.maximized || win.dataset.maximized === 'false') {
        // 儲存原本的大小與位置
        win.dataset.prevTop = win.style.top;
        win.dataset.prevLeft = win.style.left;
        win.dataset.prevWidth = win.style.width || win.offsetWidth + 'px';
        win.dataset.prevHeight = win.style.height || win.offsetHeight + 'px';
        
        win.style.top = '0';
        win.style.left = '0';
        win.style.width = '100%';
        win.style.height = 'calc(100% - 30px)';
        win.dataset.maximized = 'true';
      } else {
        // 還原
        win.style.top = win.dataset.prevTop;
        win.style.left = win.dataset.prevLeft;
        win.style.width = win.dataset.prevWidth;
        win.style.height = win.dataset.prevHeight;
        win.dataset.maximized = 'false';
      }
      bringToFront(winId);
    }

    // 視窗拖曳功能
    document.querySelectorAll('.window').forEach(win => {
      win.addEventListener('mousedown', () => bringToFront(win.id));
      
      const titleBar = win.querySelector('.title-bar');
      let isDragging = false, startX, startY, initialLeft, initialTop;

      titleBar.addEventListener('mousedown', (e) => {
        if(e.target.closest('.title-bar-controls')) return;
        if(win.dataset.maximized === 'true') return; // 最大化時不允許拖曳
        
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        initialLeft = win.offsetLeft;
        initialTop = win.offsetTop;
        document.body.style.userSelect = 'none';
      });

      window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        win.style.left = `${initialLeft + dx}px`;
        win.style.top = `${initialTop + dy}px`;
      });

      window.addEventListener('mouseup', () => {
        isDragging = false;
        document.body.style.userSelect = '';
      });
    });

    // 桌面點擊處理
    document.getElementById('desktop').addEventListener('click', (e) => {
      if (!e.target.closest('.desktop-icon')) {
        document.querySelectorAll('.desktop-icon').forEach(icon => icon.classList.remove('selected'));
      }
    });

    document.querySelectorAll('.desktop-icon').forEach(icon => {
      icon.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected'));
        icon.classList.add('selected');
      });
    });

    // 時鐘更新
    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      let m = now.getMinutes();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12;
      h = h ? h : 12; 
      m = m < 10 ? '0' + m : m;
      document.getElementById('clock').innerText = `${h}:${m} ${ampm}`;
    }
    setInterval(updateClock, 1000);
    updateClock();


    // ======= 資料串接 ======= //
    const ctx = document.getElementById('sensorChart').getContext('2d');
    const sensorChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          { label: '溫度', data: [], borderColor: 'red', fill: false, tension: 0.1 },
          { label: '濕度', data: [], borderColor: 'blue', fill: false, tension: 0.1 },
          { label: '光照度', data: [], borderColor: 'orange', fill: false, tension: 0.1 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { x: { display: true }, y: { display: true } }
      }
    });

    function fetchLatestData() {
      fetch('/api/latest/')
        .then(res => res.json())
        .then(data => {
          if (data.temperature !== null) document.getElementById('val-temperature').innerText = data.temperature.toFixed(2) + ' °C';
          if (data.humidity !== null) document.getElementById('val-humidity').innerText = data.humidity.toFixed(2) + ' %';
          if (data.light !== null) document.getElementById('val-light').innerText = data.light.toFixed(2) + ' lx';
        })
        .catch(err => console.error(err));
    }

    function fetchHistoryData() {
      fetch('/api/history/')
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('history-table-body');
          tbody.innerHTML = '';
          if (data.records && data.records.length > 0) {
            data.records.forEach(r => {
              const tr = document.createElement('tr');
              tr.innerHTML = `<td>${r.timestamp}</td><td>${r.topic}</td><td>${r.value}</td>`;
              tbody.appendChild(tr);
            });
          } else {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">尚無資料</td></tr>';
          }
          if (data.chart_data) {
            sensorChart.data.labels = data.chart_data.labels;
            sensorChart.data.datasets[0].data = data.chart_data.temperature;
            sensorChart.data.datasets[1].data = data.chart_data.humidity;
            sensorChart.data.datasets[2].data = data.chart_data.light;
            sensorChart.update();
          }
        })
        .catch(err => console.error(err));
    }

    setInterval(fetchLatestData, 1000);
    setInterval(fetchHistoryData, 5000);
    fetchLatestData();
    fetchHistoryData();
  </script>
</body>
</html>
